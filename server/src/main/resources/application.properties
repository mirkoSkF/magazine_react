spring.application.name=magazine

# Connessione a MAMP - Ho aggiornato il nome del DB a magazine_db
spring.datasource.url=jdbc:mariadb://localhost:3306/magazine_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Istruzioni per Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Imposta la dimensione massima del singolo file caricato
spring.servlet.multipart.max-file-size=10MB

# Imposta la dimensione massima totale della richiesta (es. testo + immagini)
spring.servlet.multipart.max-request-size=10MB

server.port=8096